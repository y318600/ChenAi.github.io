baseURL = "https://ichenai.github.io/"
languageCode = "zh-CN"
title = "ChenAi"
theme = "papermod"

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[params]
  env = "production"
  description = "ChenAi 的技术博客"

  [params.homeInfoParams]
    Title = "Hi, I'm ChenAi 👋"
    Content = "热爱技术，持续学习 · Android 逆向 · 系统编程"

  [params.profileMode]
    enabled = true
    title = "ChenAi"
    subtitle = "热爱技术，持续学习"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/iChenAi"

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 20
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 30